<main class="login auth-page">
  <div class="top-bar">
    <h1 class="foodtrack-title">FoodTrack</h1>
  </div>

  <section class="center" aria-labelledby="register-title">
    <div class="marco-login register-panel">
      <h2 id="register-title" class="titulo">Crear cuenta</h2>

      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label for="fullName">Nombre</label>
          <input
            id="fullName"
            name="fullName"
            [(ngModel)]="form.fullName"
            autocomplete="name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Correo</label>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="form.email"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            [(ngModel)]="form.password"
            autocomplete="new-password"
            required
          />
        </div>

        <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

        <div class="acciones">
          <button class="btn cancelar" type="button" routerLink="/login">Volver</button>
          <button class="btn gold" type="submit" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Creando...' : 'Registrarse' }}
          </button>
        </div>
      </form>

      <a class="auth-link" routerLink="/login">Ya tengo cuenta</a>
    </div>
  </section>
</main>
