<main class="login auth-page">
  <div class="top-bar">
    <h1 class="foodtrack-title">FoodTrack</h1>
  </div>

  <section class="center" aria-labelledby="login-title">
    <div class="marco-login">
      <h2 id="login-title" class="titulo">Iniciar sesión</h2>

      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label for="email">Correo</label>
          <input
            id="email"
            name="email"
            type="email"
            [(ngModel)]="credentials.email"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            [(ngModel)]="credentials.password"
            autocomplete="current-password"
            required
          />
        </div>

        <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

        <div class="acciones">
          <button class="btn cancelar" type="button" routerLink="/">Cancelar</button>
          <button class="btn continuar" type="submit" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Ingresando...' : 'Ingresar' }}
          </button>
        </div>
      </form>

      <p class="auth-link">Solicita tu cuenta a un administrador.</p>
    </div>
  </section>
</main>
