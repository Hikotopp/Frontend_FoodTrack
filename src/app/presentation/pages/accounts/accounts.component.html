<section class="accounts-shell">
  <header class="accounts-header">
    <div>
      <button class="btn-outline back-link" routerLink="/mesas">Volver a mesas</button>
      <p class="eyebrow">FoodTrack control center</p>
      <h1>Cuentas de equipo</h1>
      <p class="intro">Administra el tipo de cuenta desde permisos respaldados por backend.</p>
    </div>

    <div class="header-actions">
      <button class="btn-outline" routerLink="/historial">Historial</button>
      <div class="session-card">
        <span>{{ userName || 'Administrador' }}</span>
        <small>Administrador</small>
      </div>
      <button class="btn-outline" (click)="logout()">Cerrar sesión</button>
    </div>
  </header>

  <p class="feedback error" *ngIf="errorMessage">{{ errorMessage }}</p>

  <form class="panel account-form" (ngSubmit)="createUser()">
    <input
      name="fullName"
      [(ngModel)]="newUser.fullName"
      placeholder="Nombre"
      autocomplete="name"
      required
    />
    <input
      name="email"
      type="email"
      [(ngModel)]="newUser.email"
      placeholder="Correo"
      autocomplete="email"
      required
    />
    <input
      name="password"
      type="password"
      [(ngModel)]="newUser.password"
      placeholder="Contraseña temporal"
      autocomplete="new-password"
      required
    />
    <select name="role" [(ngModel)]="newUser.role">
      <option *ngFor="let role of roleOptions" [ngValue]="role">{{ formatRole(role) }}</option>
    </select>
    <button class="btn-primary" type="submit" [disabled]="isSaving">Crear cuenta</button>
  </form>

  <div class="empty-state panel" *ngIf="isLoading">Cargando cuentas desde el backend...</div>

  <div class="accounts-table panel" *ngIf="!isLoading">
    <div class="table-row table-head">
      <span>Nombre</span>
      <span>Correo</span>
      <span>Tipo de cuenta</span>
      <span>Accion</span>
    </div>

    <div class="table-row" *ngFor="let user of users; trackBy: trackByUserId">
      <strong>{{ user.fullName }}</strong>
      <span>{{ user.email }}</span>
      <select [(ngModel)]="roleDrafts[user.id]">
        <option *ngFor="let role of roleOptions" [ngValue]="role">{{ formatRole(role) }}</option>
      </select>
      <button class="btn-primary" [disabled]="isSaving" (click)="updateRole(user)">Guardar</button>
    </div>
  </div>
</section>
