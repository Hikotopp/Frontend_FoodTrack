<div class="login">

  <div class="top-bar">
    <h1 class="foodtrack-title">FoodTrack</h1>
  </div>

  <div class="center">
    <div class="marco-login">

      <h1 class="titulo">INICIO DE SESIÓN</h1>

      <div *ngIf="error" class="error-mensaje">
        {{ error }}
      </div>

      <form (ngSubmit)="onSubmit()">

        <div class="form-group">
          <label>USUARIO</label>
          <input 
            type="text" 
            [(ngModel)]="usuario" 
            name="usuario"
            placeholder="Ingrese su usuario"
            required />
        </div>

        <div class="form-group">
          <label>CONTRASEÑA</label>
          <input 
            type="password" 
            [(ngModel)]="contrasena" 
            name="contrasena"
            placeholder="Ingrese su contraseña"
            required />
        </div>

        <div class="acciones">
          <button type="button" class="btn-outline" routerLink="/">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="cargando">
            {{ cargando ? 'Ingresando...' : 'Continuar' }}
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
