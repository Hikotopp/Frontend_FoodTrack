<div class="login">
  <div class="top-bar">
    <h1 class="foodtrack-title">FoodTrack</h1>
  </div>

  <div class="center">
    <div class="marco-login">
      <h1 class="titulo">CREAR CUENTA</h1>
      <p class="copy">Las cuentas nuevas se registran como empleados. Los procesos de admin quedan protegidos por rol.</p>

      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label for="nombre">NOMBRE COMPLETO</label>
          <input
            id="nombre"
            name="fullName"
            type="text"
            autocomplete="name"
            [(ngModel)]="form.fullName"
          />
        </div>

        <div class="form-group">
          <label for="register-email">CORREO</label>
          <input
            id="register-email"
            name="email"
            type="email"
            autocomplete="email"
            [(ngModel)]="form.email"
          />
        </div>

        <div class="form-group">
          <label for="register-password">CONTRASENA</label>
          <input
            id="register-password"
            name="password"
            type="password"
            autocomplete="new-password"
            [(ngModel)]="form.password"
          />
        </div>

        <p *ngIf="errorMessage" class="feedback error">{{ errorMessage }}</p>

        <div class="acciones">
          <button type="button" class="btn-outline" routerLink="/">Cancelar</button>
          <button type="submit" class="btn-primary" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Creando...' : 'Continuar' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
